[EMC]
MACHINE = Endchen ATC
DEBUG = 1
VERSION = 1.1

[DISPLAY]
DISPLAY = probe_basic
OPEN_FILE = ~/linuxcnc/nc_files/pb_examples/blank.ngc
CONFIG_FILE = custom_config.yml
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.000000
MAX_SPINDLE_OVERRIDE = 2.000000
MIN_SPINDLE_OVERRIDE = 0.500000
INTRO_GRAPHIC = pbsplash.png
INTRO_TIME = 3
PROGRAM_PREFIX = /home/cnc/linuxcnc/nc_files
INCREMENTS = JOG 5mm 1mm .5mm .1mm
DEFAULT_LINEAR_VELOCITY = 100
MAX_LINEAR_VELOCITY = 250
MIN_LINEAR_VELOCITY = 0.5
DEFAULT_ANGULAR_VELOCITY = 16.5
MAX_ANGULAR_VELOCITY = 180.000000
MIN_ANGULAR_VELOCITY = 1.666667
DEFAULT_SPINDLE_SPEED = 6000
USER_TABS_PATH = user_tabs/             
USER_BUTTONS_PATH = user_buttons/       
USER_DROS_PATH = user_dro_display/      
DRO_DISPLAY = xyz
EDITOR = geany
GEOMETRY = xyz
CYCLE_TIME = 0.1
KEYBOARD_JOG = true
TOOL_TABLE_COLUMNS = TZDR

# ATC tab display options, 0 = no atc tab displayed, 1 = Carousel atc display, 2 = rack atc display
ATC_TAB_DISPLAY = 2
USER_ATC_BUTTONS_PATH = user_atc_buttons/


[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[ATC]
POCKETS = 9
Z_TOOL_CHANGE_HEIGHT    = -3.1900
Z_TOOL_CLEARANCE_HEIGHT = 0.0000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[PYTHON]
TOPLEVEL = ./python/toplevel.py
PATH_APPEND = ./python/


[RS274NGC]
RS274NGC_STARTUP_CODE = F10 S6000 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = linuxcnc.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
SUBROUTINE_PATH = macros_atc
ON_ABORT_COMMAND = O<on_abort> CALL
REMAP=M6  modalgroup=6 prolog=change_prolog ngc=toolchange epilog=change_epilog
REMAP=M10 modalgroup=6 argspec=P ngc=m10
REMAP=M11 modalgroup=6 argspec=p ngc=m11
REMAP=M12 modalgroup=6 argspec=p ngc=m12
REMAP=M13 modalgroup=6 ngc=m13
REMAP=M21 modalgroup=6 ngc=m21
REMAP=M22 modalgroup=6 ngc=m22
REMAP=M23 modalgroup=6 ngc=m23
REMAP=M24 modalgroup=6 ngc=m24
REMAP=M25 modalgroup=6 ngc=m25
REMAP=M26 modalgroup=6 ngc=m26


[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000
HOMEMOD = el7_homecomp

[HAL]
